name: Bump Version
run-name: bump version to ${{ inputs.version }}

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'New version (e.g. 1.2.3)'
        required: true
        type: string

jobs:
  bump-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GIT_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          echo "${{ secrets.GIT_GPG_PRIVATE_KEY }}" | gpg --batch --pinentry-mode loopback --import
          git config --global user.email "ci@mostly.ai"
          git config --global user.name "mostlyai-ci"
          git config --global user.signingkey ${{ secrets.GIT_GPG_KEY_ID }}
          git config --global commit.gpgsign true

      - name: Update version in pyproject.toml
        run: |
          sed -i -E 's/^version = ".*"/version = "${{ inputs.version }}"/' pyproject.toml

      - name: Update version in __init__.py
        run: |
          sed -i -E 's/^__version__ = ".*"/__version__ = "${{ inputs.version }}"/' mostlyai/qa/__init__.py

      - name: Commit and Push
        run: |
          BRANCH_NAME="release-${{ inputs.version }}"
          git checkout -B $BRANCH_NAME
          git add pyproject.toml mostlyai/qa/__init__.py
          git commit -m "build: bump version to ${{ inputs.version }}"
          git push -f origin $BRANCH_NAME

      - name: Create and Merge PR
        env:
          GH_TOKEN: ${{ secrets.GIT_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          pr_id=$(gh pr list --head release-${{ inputs.version }} --base main --json number --jq '.[0].number')
          if [ -z "$pr_id" ]; then
            pr_id=$(gh pr create \
              --title "build: release ${{ inputs.version }}" \
              --body "Release version ${{ inputs.version }}." \
              --base main \
              --head release-${{ inputs.version }})
          fi
          # Merge it automatically
          gh pr merge $pr_id --squash
